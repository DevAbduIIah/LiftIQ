<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LiftIQ</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: "Segoe UI", "Inter", sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          radial-gradient(circle at top left, rgba(109, 211, 182, 0.16), transparent 30%),
          radial-gradient(circle at bottom right, rgba(56, 189, 248, 0.16), transparent 26%),
          linear-gradient(180deg, #08111f 0%, #050b14 100%);
        color: #f3f7ff;
      }

      #root {
        min-height: 100vh;
      }

      .app-loading {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .app-loading-card {
        width: min(520px, 100%);
        padding: 32px;
        border-radius: 28px;
        background: linear-gradient(180deg, rgba(14, 29, 53, 0.92), rgba(10, 20, 38, 0.98));
        border: 1px solid rgba(157, 181, 222, 0.18);
        box-shadow: 0 24px 64px rgba(1, 6, 16, 0.45);
      }

      .app-loading-mark {
        width: 48px;
        height: 48px;
        border-radius: 16px;
        display: grid;
        place-items: center;
        background: linear-gradient(135deg, #6dd3b6, #3b82f6);
        color: #052033;
        font-weight: 800;
        letter-spacing: 0.08em;
      }

      .app-loading h1,
      .app-loading p {
        margin: 0;
      }

      .app-loading h1 {
        margin-top: 18px;
        font-size: 2rem;
      }

      .app-loading p {
        margin-top: 10px;
        color: #98abc8;
        line-height: 1.5;
      }

      .app-loading code {
        display: inline-block;
        margin-top: 14px;
        padding: 10px 12px;
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.04);
        color: #d9e7ff;
        font-family: Consolas, monospace;
        font-size: 0.92rem;
      }
    </style>
    <script type="module" crossorigin src="/assets/index-iqKLtvXV.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-D8mv4bOq.css">
  </head>
  <body>
    <div id="root">
      <div class="app-loading">
        <div class="app-loading-card">
          <div class="app-loading-mark">LQ</div>
          <h1>Loading LiftIQ</h1>
          <p id="boot-message">
            If this screen stays here, the frontend is usually being served without Vite.
          </p>
          <code id="boot-command">Run: npm run client:dev</code>
        </div>
      </div>
    </div>
    <noscript>
      <div class="app-loading">
        <div class="app-loading-card">
          <div class="app-loading-mark">LQ</div>
          <h1>JavaScript is required</h1>
          <p>LiftIQ needs JavaScript enabled to render the application shell.</p>
        </div>
      </div>
    </noscript>
    <script>
      window.addEventListener("error", function () {
        var message = document.getElementById("boot-message");
        if (message) {
          message.textContent =
            "The page loaded, but the app bundle did not mount. Start the app with Vite and then refresh.";
        }
      });

      window.setTimeout(function () {
        if (document.documentElement.dataset.appMounted === "true") {
          return;
        }

        var message = document.getElementById("boot-message");
        var command = document.getElementById("boot-command");

        if (message) {
          message.textContent =
            "LiftIQ is waiting for the Vite frontend server. Opening index.html directly or using a generic static server will leave this screen visible.";
        }

        if (command) {
          command.textContent = "From LiftIQ: npm run client:dev";
        }
      }, 2500);
    </script>
  </body>
</html>
